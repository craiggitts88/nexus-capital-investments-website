      <tspan fill="#00e8aa">$2000</tspan>
      <tspan fill="rgba(0,188,212,0.4)">  |  </tspan>
      <tspan fill="rgba(185,210,240,0.68)">TP </tspan>
      <tspan fill="#00e8aa">$5000</tspan>
