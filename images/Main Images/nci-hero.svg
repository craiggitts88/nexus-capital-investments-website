<svg viewBox="0 0 580 500" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- Globe gradient: subtle gold highlight top-left -->
    <radialGradient id="globeSurface" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="55%"  stop-color="#0d1a2e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#040a12" stop-opacity="0.95"/>
    </radialGradient>
    <!-- Outer aura -->
    <radialGradient id="globeAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.25"/>
      <stop offset="60%"  stop-color="#c9a84c" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold glow filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip to globe -->
    <clipPath id="globeClip">
      <circle cx="268" cy="242" r="148"/>
    </clipPath>
  </defs>

  <!-- ── Outer aura ── -->
  <ellipse cx="268" cy="242" rx="230" ry="230" fill="url(#globeAura)"/>

  <!-- ── Orbital ring BACK (behind globe) ── -->
  <!-- Ring 1 back arc: top portion of a tilted ellipse -->
  <path d="M 110 195 Q 268 138 426 195" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.22" fill="none" stroke-dasharray="5 4"/>
  <!-- Ring 2 back arc -->
  <path d="M 84 268 Q 268 192 452 268" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.15" fill="none" stroke-dasharray="4 5"/>

  <!-- ── Globe body ── -->
  <circle cx="268" cy="242" r="148" fill="url(#globeSurface)"/>
  <circle cx="268" cy="242" r="148" stroke="#c9a84c" stroke-width="1.4" stroke-opacity="0.55"/>

  <!-- ── Latitude lines (clipped) ── -->
  <g clip-path="url(#globeClip)" stroke="#c9a84c" stroke-opacity="0.14" stroke-width="0.8" fill="none">
    <ellipse cx="268" cy="164" rx="108" ry="22"/>
    <ellipse cx="268" cy="203" rx="135" ry="22"/>
    <ellipse cx="268" cy="242" rx="148" ry="22"/>
    <ellipse cx="268" cy="281" rx="135" ry="22"/>
    <ellipse cx="268" cy="320" rx="108" ry="22"/>
  </g>

  <!-- ── Longitude lines (clipped) ── -->
  <g clip-path="url(#globeClip)" stroke="#c9a84c" stroke-opacity="0.14" stroke-width="0.8" fill="none">
    <ellipse cx="268" cy="242" rx="36"  ry="148"/>
    <ellipse cx="268" cy="242" rx="74"  ry="148"/>
    <ellipse cx="268" cy="242" rx="112" ry="148"/>
  </g>

  <!-- ── Globe highlight (specular) ── -->
  <ellipse cx="232" cy="198" rx="38" ry="24" fill="rgba(201,168,76,0.07)" transform="rotate(-15 232 198)"/>

  <!-- ── Orbital ring FRONT ── -->
  <!-- Ring 1 front arc -->
  <path d="M 110 195 Q 268 252 426 195" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.55" fill="none"/>
  <!-- Traveling dot on ring 1 -->
  <circle cx="192" cy="215" r="3.5" fill="#c9a84c" opacity="0.9" filter="url(#goldGlow)"/>
  <!-- Ring 2 front arc -->
  <path d="M 84 268 Q 268 350 452 268" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.38" fill="none" stroke-dasharray="none"/>
  <!-- Traveling dot on ring 2 -->
  <circle cx="370" cy="322" r="3" fill="#c9a84c" opacity="0.75" filter="url(#goldGlow)"/>

  <!-- ── Financial center nodes on globe ── -->
  <!-- London: ~(228, 198) -->
  <circle cx="228" cy="198" r="4.5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="228" cy="198" r="2"   fill="#c9a84c"/>
  <!-- New York: ~(182, 228) -->
  <circle cx="182" cy="228" r="4.5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="182" cy="228" r="2"   fill="#c9a84c"/>
  <!-- Frankfurt: ~(260, 192) -->
  <circle cx="260" cy="192" r="4.5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="260" cy="192" r="2"   fill="#c9a84c"/>
  <!-- Tokyo: ~(338, 215) -->
  <circle cx="338" cy="215" r="4.5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="338" cy="215" r="2"   fill="#c9a84c"/>
  <!-- Sydney: ~(348, 288) -->
  <circle cx="348" cy="288" r="4.5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="348" cy="288" r="2"   fill="#c9a84c"/>
  <!-- Dubai: ~(296" cy="240) -->
  <circle cx="296" cy="240" r="4.5" fill="rgba(201,168,76,0.15)" stroke="#c9a84c" stroke-width="1.2"/>
  <circle cx="296" cy="240" r="2"   fill="#c9a84c"/>

  <!-- ── Connection arcs between nodes ── -->
  <path d="M 228 198 Q 245 175 260 192" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4" fill="none" stroke-dasharray="3 2"/>
  <path d="M 260 192 Q 299 186 338 215" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4" fill="none" stroke-dasharray="3 2"/>
  <path d="M 338 215 Q 343 252 348 288" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4" fill="none" stroke-dasharray="3 2"/>
  <path d="M 182 228 Q 205 213 228 198" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4" fill="none" stroke-dasharray="3 2"/>
  <path d="M 296 240 Q 317 264 348 288" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3" fill="none" stroke-dasharray="3 2"/>
  <path d="M 182 228 Q 239 234 296 240" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.3" fill="none" stroke-dasharray="3 2"/>

  <!-- City labels -->
  <text x="214" y="190" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">LON</text>
  <text x="156" y="226" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">NYC</text>
  <text x="248" y="184" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">FRA</text>
  <text x="344" y="209" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">TYO</text>
  <text x="354" y="284" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">SYD</text>
  <text x="300" y="255" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.7">DXB</text>

  <!-- ── Floating data panel — Portfolio Performance ── -->
  <g transform="translate(440, 68)">
    <rect x="0" y="0" width="128" height="96" rx="8" fill="rgba(4,10,18,0.9)" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="128" height="20" rx="8" fill="rgba(201,168,76,0.08)"/>
    <rect x="0" y="12" width="128" height="8" fill="rgba(201,168,76,0.08)"/>
    <text x="10" y="14" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.9" font-weight="bold">PORTFOLIO STATUS</text>
    <!-- Mini bar chart -->
    <rect x="10"  y="30" width="8" height="42" rx="2" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="10"  y="46" width="8" height="26" rx="2" fill="rgba(201,168,76,0.45)"/>
    <rect x="22"  y="30" width="8" height="42" rx="2" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="22"  y="38" width="8" height="34" rx="2" fill="rgba(201,168,76,0.45)"/>
    <rect x="34"  y="30" width="8" height="42" rx="2" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="34"  y="40" width="8" height="32" rx="2" fill="rgba(201,168,76,0.45)"/>
    <rect x="46"  y="30" width="8" height="42" rx="2" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="46"  y="34" width="8" height="38" rx="2" fill="rgba(201,168,76,0.55)"/>
    <rect x="58"  y="30" width="8" height="42" rx="2" fill="rgba(201,168,76,0.12)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="58"  y="31" width="8" height="41" rx="2" fill="rgba(201,168,76,0.7)"/>
    <!-- Line -->
    <line x1="10" y1="76" x2="118" y2="76" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
    <text x="10" y="87" font-family="monospace" font-size="6.5" fill="#c9a84c" fill-opacity="0.6">ALGO PORTFOLIO</text>
    <text x="88" y="87" font-family="monospace" font-size="6.5" fill="#c9a84c" fill-opacity="0.9">LIVE</text>
    <circle cx="82" cy="84" r="2.5" fill="#00e88a" opacity="0.9"/>
  </g>

  <!-- ── Floating data panel — Algorithm Status ── -->
  <g transform="translate(440, 178)">
    <rect x="0" y="0" width="128" height="82" rx="8" fill="rgba(4,10,18,0.9)" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="128" height="20" rx="8" fill="rgba(201,168,76,0.08)"/>
    <rect x="0" y="12" width="128" height="8" fill="rgba(201,168,76,0.08)"/>
    <text x="10" y="14" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.9" font-weight="bold">ALGO SYSTEMS</text>
    <!-- Status items -->
    <circle cx="18" cy="30" r="3" fill="#00e88a"/>
    <text x="26" y="33" font-family="monospace" font-size="6.5" fill="#ccdde8" fill-opacity="0.8">US Indices</text>
    <text x="100" y="33" font-family="monospace" font-size="6" fill="#00e88a">ACTIVE</text>
    <circle cx="18" cy="45" r="3" fill="#00e88a"/>
    <text x="26" y="48" font-family="monospace" font-size="6.5" fill="#ccdde8" fill-opacity="0.8">EU Indices</text>
    <text x="100" y="48" font-family="monospace" font-size="6" fill="#00e88a">ACTIVE</text>
    <circle cx="18" cy="60" r="3" fill="#00e88a"/>
    <text x="26" y="63" font-family="monospace" font-size="6.5" fill="#ccdde8" fill-opacity="0.8">JPY / XAU</text>
    <text x="100" y="63" font-family="monospace" font-size="6" fill="#00e88a">ACTIVE</text>
    <line x1="10" y1="70" x2="118" y2="70" stroke="rgba(201,168,76,0.2)" stroke-width="0.5"/>
    <text x="10" y="78" font-family="monospace" font-size="6" fill="#c9a84c" fill-opacity="0.5">STRATEGY QUANT X  •  PORTFOLIO MASTER</text>
  </g>

  <!-- ── Algorithm stream lines (right side) ── -->
  <line x1="430" y1="112" x2="440" y2="112" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="3 2"/>
  <line x1="430" y1="200" x2="440" y2="218" stroke="#c9a84c" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="3 2"/>

  <!-- ── Bottom floating chart panel ── -->
  <g transform="translate(12, 370)">
    <rect x="0" y="0" width="160" height="88" rx="8" fill="rgba(4,10,18,0.9)" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.4"/>
    <text x="10" y="16" font-family="monospace" font-size="7" fill="#c9a84c" fill-opacity="0.8" font-weight="bold">ROBUSTNESS TESTING</text>
    <!-- Progress bars -->
    <text x="10" y="32" font-family="monospace" font-size="6" fill="#8899aa">Monte Carlo</text>
    <rect x="80" y="24" width="70" height="7" rx="3.5" fill="rgba(201,168,76,0.1)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="80" y="24" width="70" height="7" rx="3.5" fill="rgba(201,168,76,0.65)"/>
    <text x="10" y="46" font-family="monospace" font-size="6" fill="#8899aa">Walk-Forward</text>
    <rect x="80" y="38" width="70" height="7" rx="3.5" fill="rgba(201,168,76,0.1)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="80" y="38" width="62" height="7" rx="3.5" fill="rgba(201,168,76,0.55)"/>
    <text x="10" y="60" font-family="monospace" font-size="6" fill="#8899aa">Out-of-Sample</text>
    <rect x="80" y="52" width="70" height="7" rx="3.5" fill="rgba(201,168,76,0.1)" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="80" y="52" width="66" height="7" rx="3.5" fill="rgba(201,168,76,0.6)"/>
    <line x1="10" y1="70" x2="150" y2="70" stroke="rgba(201,168,76,0.15)" stroke-width="0.5"/>
    <text x="10" y="82" font-family="monospace" font-size="6" fill="#c9a84c" fill-opacity="0.5">INSTITUTIONAL GRADE VALIDATION</text>
  </g>

  <!-- ── Connector lines from panels to globe ── -->
  <line x1="430" y1="114" x2="416" y2="200" stroke="rgba(201,168,76,0.15)" stroke-width="0.6" stroke-dasharray="3 4"/>
  <line x1="172" y1="370" x2="240" y2="355" stroke="rgba(201,168,76,0.15)" stroke-width="0.6" stroke-dasharray="3 4"/>
</svg>
