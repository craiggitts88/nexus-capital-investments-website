<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 500">
<defs>
  <clipPath id="globe-clip"><circle cx="268" cy="242" r="148"/></clipPath>
  <filter id="blur-sm" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
  <filter id="blur-md" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="12"/></filter>
  <filter id="blur-lg" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="24"/></filter>
  <filter id="glow-dot" x="-200%" y="-200%" width="500%" height="500%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="globe-fill" cx="35%" cy="30%" r="70%">
    <stop offset="0%"   stop-color="#16100a"/>
    <stop offset="45%"  stop-color="#0a0e18"/>
    <stop offset="100%" stop-color="#020609"/>
  </radialGradient>
  <radialGradient id="globe-hi" cx="32%" cy="28%" r="55%">
    <stop offset="0%"   stop-color="#ffd878" stop-opacity="0.1"/>
    <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="amb" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#c9a84c" stop-opacity="0.13"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
  <!-- Ring orbital motion paths (full CW ellipses)
       Ring 1: rx=195 ry=60 rot=-25  P1=(445,160) P2=(91,324)
       Ring 2: rx=210 ry=50 rot=+15  P1=(471,296) P2=(65,188)
       Ring 3: rx=155 ry=38 rot=-55  P1=(357,115) P2=(179,369) -->
  <path id="r1" d="M 445,160 A 195,60,-25,1,1,91,324  A 195,60,-25,1,1,445,160"/>
  <path id="r2" d="M 471,296 A 210,50,15,1,1,65,188   A 210,50,15,1,1,471,296"/>
  <path id="r3" d="M 357,115 A 155,38,-55,1,1,179,369 A 155,38,-55,1,1,357,115"/>
</defs>

<!-- Ambient glow -->
<circle cx="268" cy="242" r="215" fill="url(#amb)" filter="url(#blur-lg)">
  <animate attributeName="r" values="210;230;210" dur="8s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0.8;1;0.8" dur="8s" repeatCount="indefinite"/>
</circle>
<circle cx="268" cy="242" r="178" fill="rgba(201,168,76,0.05)" filter="url(#blur-md)"/>

